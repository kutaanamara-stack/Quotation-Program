<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>餐具修复报价工具入口</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
        background: linear-gradient(180deg, #f6f1e8 0%, #fffdf8 100%);
        color: #1f2937;
      }

      .card {
        width: min(720px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid #d9cbb6;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 14px 34px rgba(102, 69, 32, 0.1);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      p,
      li {
        line-height: 1.75;
      }

      code {
        background: #f2eadf;
        padding: 2px 6px;
        border-radius: 6px;
      }

      a {
        color: #8a4f1d;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>餐具修复报价工具入口</h1>
      <p>电脑端不要直接双击 <code>webapp/index.html</code>，部分浏览器会显示空白页。</p>
      <p>推荐入口：</p>
      <ol>
        <li>电脑端：双击 <code>start-webapp.cmd</code>，浏览器会自动打开。</li>
        <li>手机端无需连接公司 Wi-Fi：打开公网链接 <a href="https://kutaanamara-stack.github.io/Quotation-Program/">https://kutaanamara-stack.github.io/Quotation-Program/</a>。</li>
      </ol>
      <p>如果公网链接暂时打不开，请联系管理员确认 GitHub Pages 是否已经发布完成。</p>
    </main>
  </body>
</html>
